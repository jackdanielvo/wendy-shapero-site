name: Sync from Pixieset & Deploy

# Triggers
# 1. Cron: every 4 hours, automatically pulls Wendy's latest Pixieset uploads.
# 2. workflow_dispatch: a manual "Refresh now" button (in the GitHub UI,
#    or via a one-click bookmark using the GitHub API — see README).
# 3. push to main: re-deploys whenever the source changes.
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write   # so the workflow can commit refreshed photos.json
  pages: write      # GitHub Pages deploy
  id-token: write   # GitHub Pages deploy

# Serialize runs of this workflow so a second run can't try to push or
# deploy while another is still in flight. Queued runs aren't cancelled —
# we want every admin save to actually take effect, even if the user
# clicked Save twice in quick succession.
concurrency:
  group: pages-sync-and-deploy
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync from Pixieset
        run: node scripts/sync-pixieset.js

      - name: Commit refreshed data (if changed)
        run: |
          # The sync script writes both data/photos.json and data/photos.js
          # (the .js mirror is what the static site actually loads). Commit
          # both if either changed. The skip-ci tag prevents a recursive
          # workflow run on the bot's own commit.
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name  "wendy-pix-bot"
            git config user.email "actions@github.com"
            git add data/photos.json data/photos.js
            git commit -m "chore(sync): refresh from Pixieset [skip ci]"
            # Race-protect: another workflow run might have pushed in the
            # meantime. Pull-rebase first, then push. With the concurrency
            # group above this should rarely trigger, but it's a safe
            # fallback so a transient overlap can't fail the run.
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then
                echo "Pushed on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed; retrying after pull --rebase"
              sleep 2
            done
          else
            echo "No changes from Pixieset."
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo IS the static site.
          path: .

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
