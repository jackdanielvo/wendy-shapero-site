name: Build photos & Deploy

# Triggers
# 1. workflow_dispatch: a manual "Refresh now" button (in the GitHub UI,
#    or via a one-click bookmark using the GitHub API — see README).
# 2. push to main: rebuilds and re-deploys whenever any file changes.
#
# The cron schedule was removed when we moved off Pixieset — the photos
# are now in the repo, so there's nothing to poll for. A push triggers
# the build.
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write   # so the workflow can commit refreshed photos.json
  pages: write      # GitHub Pages deploy
  id-token: write   # GitHub Pages deploy

# Serialize runs of this workflow. cancel-in-progress: true means a new
# push immediately cancels any older queued/running run for the same
# group — the latest commit always wins, no backlog. (We previously had
# false here to "preserve every save," but in practice that just stacks
# up redundant runs and slows feedback. Each push always represents the
# latest desired state, so cancelling older runs is correct.)
concurrency:
  group: pages-sync-and-deploy
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build photos data file
        run: node scripts/build-photos.js

      - name: Commit refreshed data (if changed)
        run: |
          # build-photos.js writes data/photos.{js,json} from the local
          # photos/ tree. Commit both if either changed. [skip ci] prevents
          # the bot's own commit from re-triggering the workflow.
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git config user.name  "wendy-pix-bot"
            git config user.email "actions@github.com"
            git add data/photos.json data/photos.js
            git commit -m "chore(build): rebuild photos data [skip ci]"
            for attempt in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then
                echo "Pushed on attempt $attempt"
                break
              fi
              echo "Push attempt $attempt failed; retrying after pull --rebase"
              sleep 2
            done
          else
            echo "data/photos.* already up to date."
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo IS the static site.
          path: .

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
