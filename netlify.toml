[build]
  publish = "."
  command = "npm install && node scripts/build-photos.js"
  functions = "netlify/functions"

# Pin Node version for the build container so functions get a runtime
# that supports global fetch (Node 18+) and so deps install consistently.
[build.environment]
  NODE_VERSION = "20"

# Pretty URLs: /book → /book.html, /pricing → /pricing.html, etc.
[[redirects]]
  from = "/book"
  to = "/book.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/book-success"
  to = "/book-success.html"
  status = 200

# Functions live under /api/* publicly to keep URLs clean
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
