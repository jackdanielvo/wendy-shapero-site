[build]
  publish = "."
  command = "npm install && node scripts/build-photos.js"
  functions = "netlify/functions"

# Pin Node version for the build container so functions get a runtime
# that supports global fetch (Node 18+) and so deps install consistently.
[build.environment]
  NODE_VERSION = "20"

# Pretty URLs: /book → /book.html, /pricing → /pricing.html, etc.
[[redirects]]
  from = "/book"
  to = "/book.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/book-success"
  to = "/book-success.html"
  status = 200

# Functions live under /api/* publicly to keep URLs clean
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Scheduled functions — run on a cron schedule even with no HTTP request.
# cleanup runs hourly and removes any tentative booking older than 24h
# whose client never confirmed (manual flow) or never paid (Stripe flow),
# freeing up the slot for other bookers.
[functions."cleanup"]
  schedule = "@hourly"

# reminders runs hourly and sends a 24-hour-before-the-session reminder
# email to each confirmed client. Uses a 22-26h trigger window so a
# missed cron tick still catches the booking. State is tracked in the
# bookings blob so the same booking is never reminded twice.
[functions."reminders"]
  schedule = "@hourly"
